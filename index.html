<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飲酒カウンター</title>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="alternate icon" href="favicon.ico">
  <!-- PWA manifest (Android) -->
  <link rel="manifest" href="manifest.json">
  <!-- iOS home screen -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="飲酒カウンター">
  <!-- Theme color -->
  <meta name="theme-color" content="#0f0f1a">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px 40px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ヒント */
    .hint {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      letter-spacing: 0.03em;
    }

    /* 日付 */
    .date-display {
      text-align: center;
      font-size: 15px;
      color: #94a3b8;
      font-variant-numeric: tabular-nums;
    }

    /* 飲み物ボタン */
    .drink-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .drink-btn {
      background: #1e1e2e;
      border: 1.5px solid #2d2d42;
      border-radius: 16px;
      padding: 18px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .drink-btn:active {
      transform: scale(0.95);
      background: #252538;
    }

    .drink-btn.pressed {
      background: #252538;
      border-color: #4f4f72;
    }

    .drink-btn .icon {
      font-size: 32px;
      line-height: 1;
    }

    .drink-btn .label {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 500;
    }

    .drink-btn .count {
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #e2e8f0;
      line-height: 1;
    }

    /* サマリーカード */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .card {
      background: #1e1e2e;
      border-radius: 14px;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      border: 1px solid #2d2d42;
    }

    .card .card-label {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      white-space: nowrap;
    }

    .card .card-value {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .card .card-sub {
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
    }

    .drink-btn-placeholder { visibility: hidden; }

    /* 酒レベルの色 */
    .lv0 { color: #4ade80; }
    .lv1 { color: #a3e635; }
    .lv2 { color: #facc15; }
    .lv3 { color: #fb923c; }
    .lv4 { color: #ef4444; }
    .lv5 { color: #dc2626; }

    /* リセットボタン */
    .reset-btn {
      background: transparent;
      border: 1.5px solid #3d3d58;
      border-radius: 12px;
      color: #64748b;
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      font-family: inherit;
    }

    .reset-btn:hover {
      border-color: #f87171;
      color: #f87171;
      background: rgba(248, 113, 113, 0.05);
    }

    .reset-btn:active {
      background: rgba(248, 113, 113, 0.1);
    }

    /* 操作ログ */
    .log-section {
      background: #1e1e2e;
      border-radius: 14px;
      padding: 16px;
      border: 1px solid #2d2d42;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .log-title {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
    }

    .log-count {
      font-size: 12px;
      color: #64748b;
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 240px;
      overflow-y: auto;
    }

    .log-list::-webkit-scrollbar {
      width: 4px;
    }

    .log-list::-webkit-scrollbar-track {
      background: #2d2d42;
      border-radius: 999px;
    }

    .log-list::-webkit-scrollbar-thumb {
      background: #4f4f72;
      border-radius: 999px;
    }

    .log-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      background: #16162a;
      border-radius: 8px;
      font-size: 13px;
    }

    .log-time {
      color: #64748b;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      min-width: 54px;
    }

    .log-icon {
      font-size: 16px;
      line-height: 1;
    }

    .log-drink {
      color: #cbd5e1;
      flex: 1;
    }

    .log-action {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .log-action.plus  { color: #4ade80; }
    .log-action.minus { color: #f87171; }

    .log-empty {
      text-align: center;
      font-size: 13px;
      color: #3d3d58;
      padding: 12px 0;
    }

    /* メモ入力 */
    .memo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .memo-label {
      font-size: 13px;
      color: #64748b;
      white-space: nowrap;
    }

    .memo-input {
      flex: 1;
      background: #1e1e2e;
      border: 1.5px solid #2d2d42;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: inherit;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .memo-input::placeholder {
      color: #3d3d58;
    }

    .memo-input:focus {
      border-color: #4f4f72;
    }

    .log-memo {
      color: #64748b;
      font-size: 12px;
    }

    /* ログ メモ編集 */
    .log-edit-btn,
    .log-delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #3d3d58;
      font-size: 13px;
      padding: 2px 5px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .log-edit-btn:hover { color: #94a3b8; }
    .log-delete-btn:hover { color: #f87171; }

    .log-drink-edit {
      display: flex;
      align-items: center;
      gap: 5px;
      flex: 1;
      min-width: 0;
    }

    .log-drink-name {
      color: #cbd5e1;
      white-space: nowrap;
      flex-shrink: 0;
      font-size: 13px;
    }

    .log-memo-input {
      flex: 1;
      min-width: 0;
      background: #0f0f1a;
      border: 1px solid #4f4f72;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 12px;
      font-family: inherit;
      padding: 3px 8px;
      outline: none;
    }

    .log-memo-input:focus {
      border-color: #6366f1;
    }

    .log-save-btn,
    .log-cancel-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      flex-shrink: 0;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .log-save-btn  { color: #4ade80; }
    .log-cancel-btn { color: #f87171; }
  </style>
</head>
<body>
<div class="container">
  <p class="hint">タップ +1 ／ 長押し −1</p>

  <p class="date-display" id="dateDisplay"></p>

  <div class="drink-buttons">
    <button class="drink-btn" id="btn-beer" data-type="beer">
      <span class="icon">🍺</span>
      <span class="label">ビール</span>
      <span class="count" id="count-beer">0</span>
    </button>
    <button class="drink-btn" id="btn-wine" data-type="wine">
      <span class="icon">🍷</span>
      <span class="label">ワイン</span>
      <span class="count" id="count-wine">0</span>
    </button>
    <button class="drink-btn" id="btn-sour" data-type="sour">
      <span class="icon">🍋</span>
      <span class="label">サワー/ジントニ</span>
      <span class="count" id="count-sour">0</span>
    </button>
    <button class="drink-btn" id="btn-highball" data-type="highball">
      <span class="icon">🥃</span>
      <span class="label">ハイボール</span>
      <span class="count" id="count-highball">0</span>
    </button>
    <button class="drink-btn" id="btn-sake" data-type="sake">
      <span class="icon">🍶</span>
      <span class="label">日本酒/焼酎</span>
      <span class="count" id="count-sake">0</span>
    </button>
    <div class="drink-btn-placeholder"></div>
  </div>

  <div class="memo-wrap">
    <span class="memo-label">メモ</span>
    <input type="text" class="memo-input" id="memoInput" placeholder="例：ギネス、赤ワイン…" maxlength="30">
  </div>

  <div class="summary-cards">
    <div class="card">
      <span class="card-label">合計缶数</span>
      <span class="card-value" id="totalCans" style="color:#e2e8f0">0</span>
      <span class="card-sub">缶</span>
    </div>
    <div class="card">
      <span class="card-label">酒レベル</span>
      <span class="card-value lv0" id="drinkLevel">Lv0</span>
      <span class="card-sub" id="drinkLabel">素面</span>
    </div>
    <div class="card">
      <span class="card-label">スコア</span>
      <span class="card-value" id="drinkScore" style="color:#e2e8f0">0</span>
      <span class="card-sub">pt</span>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn">今日のカウントをリセット</button>

  <div class="log-section">
    <div class="log-header">
      <span class="log-title">操作ログ</span>
      <span class="log-count" id="logCount">0件</span>
    </div>
    <div class="log-list" id="logList">
      <p class="log-empty">まだ記録がありません</p>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'drink_counter_v1';

  const DRINK_META = {
    beer:     { icon: '🍺', label: 'ビール' },
    wine:     { icon: '🍷', label: 'ワイン' },
    sour:     { icon: '🍋', label: 'サワー/ジントニ' },
    highball: { icon: '🥃', label: 'ハイボール' },
    sake:     { icon: '🍶', label: '日本酒/焼酎' },
  };

  const levels = [
    { lv: 0, score: 0,  label: '素面',     cls: 'lv0' },
    { lv: 1, score: 1,  label: '爽快期',   cls: 'lv1' },
    { lv: 2, score: 3,  label: 'ほろ酔い期', cls: 'lv2' },
    { lv: 3, score: 5,  label: '酩酊初期', cls: 'lv3' },
    { lv: 4, score: 7,  label: '酩酊極期', cls: 'lv4' },
    { lv: 5, score: 10, label: '泥酔期',   cls: 'lv5' },
  ];

  function getLevel(total) {
    if (total === 0) return levels[0];
    if (total <= 1) return levels[1];
    if (total <= 3) return levels[2];
    if (total <= 5) return levels[3];
    if (total <= 9) return levels[4];
    return levels[5];
  }

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function todayDisplay() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}/${m}/${day}`;
  }

  function loadData() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      return { date: todayStr(), beer: 0, wine: 0, sour: 0, highball: 0, sake: 0, logs: [] };
    }
    const saved = JSON.parse(raw);
    return { highball: 0, sake: 0, logs: [], ...saved };
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  let state = loadData();
  let editingIndex = -1;

  function nowTimeStr() {
    const d = new Date();
    const h = String(d.getHours()).padStart(2, '0');
    const m = String(d.getMinutes()).padStart(2, '0');
    const s = String(d.getSeconds()).padStart(2, '0');
    return `${h}:${m}:${s}`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function addLog(type, action) {
    editingIndex = -1;
    const memo = document.getElementById('memoInput').value.trim();
    const entry = { time: nowTimeStr(), type, action };
    if (memo) entry.memo = memo;
    state.logs.unshift(entry);
    if (memo) document.getElementById('memoInput').value = '';
  }

  function renderLog() {
    const list = document.getElementById('logList');
    const logs = state.logs;
    document.getElementById('logCount').textContent = `${logs.length}件`;
    if (logs.length === 0) {
      list.innerHTML = '<p class="log-empty">まだ記録がありません</p>';
      return;
    }
    list.innerHTML = logs.map((entry, i) => {
      const meta = DRINK_META[entry.type];
      const isPlus = entry.action === '+1';

      if (editingIndex === i) {
        const memoVal = entry.memo ? escapeHtml(entry.memo) : '';
        return `<div class="log-item" data-index="${i}">
          <span class="log-time">${entry.time}</span>
          <span class="log-icon">${meta.icon}</span>
          <span class="log-drink-edit">
            <span class="log-drink-name">${meta.label}</span>
            <input class="log-memo-input" type="text" maxlength="30" value="${memoVal}" placeholder="メモ…" data-index="${i}" autocomplete="off">
          </span>
          <button class="log-save-btn" data-action="save" data-index="${i}" title="保存">✓</button>
          <button class="log-cancel-btn" data-action="cancel" title="キャンセル">✗</button>
          <span class="log-action ${isPlus ? 'plus' : 'minus'}">${entry.action}</span>
        </div>`;
      }

      const memoHtml = entry.memo
        ? ` <span class="log-memo">· ${escapeHtml(entry.memo)}</span>`
        : '';
      return `<div class="log-item" data-index="${i}">
        <span class="log-time">${entry.time}</span>
        <span class="log-icon">${meta.icon}</span>
        <span class="log-drink">${meta.label}${memoHtml}</span>
        <button class="log-edit-btn" data-action="edit" data-index="${i}" title="メモを編集">✎</button>
        <button class="log-delete-btn" data-action="delete" data-index="${i}" title="削除">✕</button>
        <span class="log-action ${isPlus ? 'plus' : 'minus'}">${entry.action}</span>
      </div>`;
    }).join('');

    if (editingIndex !== -1) {
      const input = list.querySelector('.log-memo-input');
      if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
    }
  }

  function render() {
    document.getElementById('dateDisplay').textContent = todayDisplay();

    ['beer', 'wine', 'sour', 'highball', 'sake'].forEach(type => {
      document.getElementById(`count-${type}`).textContent = state[type];
    });

    const total = state.beer + state.wine + state.sour + state.highball + state.sake;
    const lvInfo = getLevel(total);

    const totalEl = document.getElementById('totalCans');
    totalEl.textContent = total;

    const levelEl = document.getElementById('drinkLevel');
    levelEl.textContent = `Lv${lvInfo.lv}`;
    levelEl.className = `card-value ${lvInfo.cls}`;

    document.getElementById('drinkLabel').textContent = lvInfo.label;
    document.getElementById('drinkScore').textContent = lvInfo.score;

    renderLog();
  }

  // ボタンの長押し処理
  const LONG_PRESS_MS = 500;

  ['beer', 'wine', 'sour', 'highball', 'sake'].forEach(type => {
    const btn = document.getElementById(`btn-${type}`);
    let timer = null;
    let isLongPress = false;

    function startPress(e) {
      e.preventDefault();
      isLongPress = false;
      btn.classList.add('pressed');
      timer = setTimeout(() => {
        isLongPress = true;
        // -1 (min 0)
        const before = state[type];
        if (before > 0) {
          state[type]--;
          addLog(type, '-1');
          saveData(state);
          render();
          vibrate(30);
        }
      }, LONG_PRESS_MS);
    }

    function endPress(e) {
      e.preventDefault();
      btn.classList.remove('pressed');
      clearTimeout(timer);
      if (!isLongPress) {
        // +1
        state[type]++;
        addLog(type, '+1');
        saveData(state);
        render();
        vibrate(15);
      }
    }

    function cancelPress() {
      btn.classList.remove('pressed');
      clearTimeout(timer);
    }

    btn.addEventListener('mousedown', startPress);
    btn.addEventListener('mouseup', endPress);
    btn.addEventListener('mouseleave', cancelPress);

    btn.addEventListener('touchstart', startPress, { passive: false });
    btn.addEventListener('touchend', endPress, { passive: false });
    btn.addEventListener('touchcancel', cancelPress);
  });

  function vibrate(ms) {
    if (navigator.vibrate) navigator.vibrate(ms);
  }

  // リセット
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('今日のカウントをリセットしますか？')) return;
    editingIndex = -1;
    state.beer = 0;
    state.wine = 0;
    state.sour = 0;
    state.highball = 0;
    state.sake = 0;
    state.date = todayStr();
    state.logs = [];
    saveData(state);
    render();
  });

  // ログ メモ編集
  const logList = document.getElementById('logList');

  function saveMemo(idx) {
    const input = logList.querySelector('.log-memo-input');
    if (input) {
      const memo = input.value.trim();
      if (memo) {
        state.logs[idx].memo = memo;
      } else {
        delete state.logs[idx].memo;
      }
      saveData(state);
    }
    editingIndex = -1;
    renderLog();
  }

  logList.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const idx = parseInt(btn.dataset.index, 10);
    if (action === 'edit') {
      editingIndex = idx;
      renderLog();
    } else if (action === 'save') {
      saveMemo(idx);
    } else if (action === 'cancel') {
      editingIndex = -1;
      renderLog();
    } else if (action === 'delete') {
      const entry = state.logs[idx];
      if (entry.action === '+1' && state[entry.type] > 0) {
        state[entry.type]--;
      } else if (entry.action === '-1') {
        state[entry.type]++;
      }
      state.logs.splice(idx, 1);
      if (editingIndex === idx) editingIndex = -1;
      saveData(state);
      render();
    }
  });

  logList.addEventListener('keydown', e => {
    if (!e.target.classList.contains('log-memo-input')) return;
    if (e.key === 'Enter') {
      e.preventDefault();
      saveMemo(editingIndex);
    } else if (e.key === 'Escape') {
      editingIndex = -1;
      renderLog();
    }
  });

  render();
</script>
</body>
</html>
