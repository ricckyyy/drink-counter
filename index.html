<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飲酒カウンター</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px 40px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ヒント */
    .hint {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      letter-spacing: 0.03em;
    }

    /* 日付 */
    .date-display {
      text-align: center;
      font-size: 15px;
      color: #94a3b8;
      font-variant-numeric: tabular-nums;
    }

    /* 飲み物ボタン */
    .drink-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .drink-btn {
      background: #1e1e2e;
      border: 1.5px solid #2d2d42;
      border-radius: 16px;
      padding: 18px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .drink-btn:active {
      transform: scale(0.95);
      background: #252538;
    }

    .drink-btn.pressed {
      background: #252538;
      border-color: #4f4f72;
    }

    .drink-btn .icon {
      font-size: 32px;
      line-height: 1;
    }

    .drink-btn .label {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 500;
    }

    .drink-btn .count {
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #e2e8f0;
      line-height: 1;
    }

    /* サマリーカード */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .card {
      background: #1e1e2e;
      border-radius: 14px;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      border: 1px solid #2d2d42;
    }

    .card .card-label {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      white-space: nowrap;
    }

    .card .card-value {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .card .card-sub {
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
    }

    /* 酒レベルの色 */
    .lv0 { color: #4ade80; }
    .lv1 { color: #facc15; }
    .lv2 { color: #fb923c; }
    .lv3 { color: #f87171; }

    /* 週間ゲージ */
    .weekly-section {
      background: #1e1e2e;
      border-radius: 14px;
      padding: 16px;
      border: 1px solid #2d2d42;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .weekly-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .weekly-title {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
    }

    .weekly-count {
      font-size: 14px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      background: #2d2d42;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .progress-fill.green  { background: #4ade80; }
    .progress-fill.orange { background: #fb923c; }
    .progress-fill.red    { background: #f87171; }

    .weekly-warning {
      font-size: 12px;
      color: #f87171;
      text-align: center;
    }

    /* リセットボタン */
    .reset-btn {
      background: transparent;
      border: 1.5px solid #3d3d58;
      border-radius: 12px;
      color: #64748b;
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      font-family: inherit;
    }

    .reset-btn:hover {
      border-color: #f87171;
      color: #f87171;
      background: rgba(248, 113, 113, 0.05);
    }

    .reset-btn:active {
      background: rgba(248, 113, 113, 0.1);
    }
  </style>
</head>
<body>
<div class="container">
  <p class="hint">タップ +1 ／ 長押し −1</p>

  <p class="date-display" id="dateDisplay"></p>

  <div class="drink-buttons">
    <button class="drink-btn" id="btn-beer" data-type="beer">
      <span class="icon">🍺</span>
      <span class="label">ビール</span>
      <span class="count" id="count-beer">0</span>
    </button>
    <button class="drink-btn" id="btn-wine" data-type="wine">
      <span class="icon">🍷</span>
      <span class="label">ワイン</span>
      <span class="count" id="count-wine">0</span>
    </button>
    <button class="drink-btn" id="btn-sour" data-type="sour">
      <span class="icon">🍋</span>
      <span class="label">サワー/ジントニ</span>
      <span class="count" id="count-sour">0</span>
    </button>
  </div>

  <div class="summary-cards">
    <div class="card">
      <span class="card-label">合計缶数</span>
      <span class="card-value" id="totalCans" style="color:#e2e8f0">0</span>
      <span class="card-sub">缶</span>
    </div>
    <div class="card">
      <span class="card-label">酒レベル</span>
      <span class="card-value lv0" id="drinkLevel">Lv0</span>
      <span class="card-sub" id="drinkLabel">素面</span>
    </div>
    <div class="card">
      <span class="card-label">スコア</span>
      <span class="card-value" id="drinkScore" style="color:#e2e8f0">0</span>
      <span class="card-sub">pt</span>
    </div>
  </div>

  <div class="weekly-section">
    <div class="weekly-header">
      <span class="weekly-title">週間ゲージ（目標: 5缶 / 週）</span>
      <span class="weekly-count" id="weeklyCount">0 / 5缶</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill green" id="progressFill" style="width:0%"></div>
    </div>
    <p class="weekly-warning" id="weeklyWarning" style="display:none">⚠ 週間目標を超過しています</p>
  </div>

  <button class="reset-btn" id="resetBtn">今日のカウントをリセット</button>
</div>

<script>
  const STORAGE_KEY = 'drink_counter_v1';
  const WEEKLY_GOAL = 5;

  const levels = [
    { max: 0,        lv: 0, score: 0,  label: '素面',    cls: 'lv0' },
    { max: 3,        lv: 1, score: 3,  label: 'ほろ酔い', cls: 'lv1' },
    { max: 7,        lv: 2, score: 7,  label: '酔い気味', cls: 'lv2' },
    { max: Infinity, lv: 3, score: 10, label: 'べろべろ', cls: 'lv3' },
  ];

  function getLevel(total) {
    if (total === 0) return levels[0];
    if (total <= 3) return levels[1];
    if (total <= 7) return levels[2];
    return levels[3];
  }

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function todayDisplay() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}/${m}/${day}`;
  }

  function loadData() {
    const raw = localStorage.getItem(STORAGE_KEY);
    const today = todayStr();
    if (!raw) {
      return { date: today, beer: 0, wine: 0, sour: 0, weekly: 0 };
    }
    const saved = JSON.parse(raw);
    if (saved.date !== today) {
      return { date: today, beer: 0, wine: 0, sour: 0, weekly: saved.weekly ?? 0 };
    }
    return saved;
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  let state = loadData();

  function render() {
    document.getElementById('dateDisplay').textContent = todayDisplay();

    ['beer', 'wine', 'sour'].forEach(type => {
      document.getElementById(`count-${type}`).textContent = state[type];
    });

    const total = state.beer + state.wine + state.sour;
    const lvInfo = getLevel(total);

    const totalEl = document.getElementById('totalCans');
    totalEl.textContent = total;

    const levelEl = document.getElementById('drinkLevel');
    levelEl.textContent = `Lv${lvInfo.lv}`;
    levelEl.className = `card-value ${lvInfo.cls}`;

    document.getElementById('drinkLabel').textContent = lvInfo.label;
    document.getElementById('drinkScore').textContent = lvInfo.score;

    // 週間ゲージ
    const weekly = state.weekly;
    const pct = Math.min((weekly / WEEKLY_GOAL) * 100, 100);
    const fill = document.getElementById('progressFill');
    fill.style.width = pct + '%';

    const weeklyCountEl = document.getElementById('weeklyCount');
    weeklyCountEl.textContent = `${weekly} / ${WEEKLY_GOAL}缶`;

    if (weekly > WEEKLY_GOAL) {
      fill.className = 'progress-fill red';
      weeklyCountEl.style.color = '#f87171';
      document.getElementById('weeklyWarning').style.display = 'block';
    } else if (weekly >= WEEKLY_GOAL * 0.8) {
      fill.className = 'progress-fill orange';
      weeklyCountEl.style.color = '#fb923c';
      document.getElementById('weeklyWarning').style.display = 'none';
    } else {
      fill.className = 'progress-fill green';
      weeklyCountEl.style.color = '#4ade80';
      document.getElementById('weeklyWarning').style.display = 'none';
    }
  }

  // ボタンの長押し処理
  const LONG_PRESS_MS = 500;

  ['beer', 'wine', 'sour'].forEach(type => {
    const btn = document.getElementById(`btn-${type}`);
    let timer = null;
    let isLongPress = false;

    function startPress(e) {
      e.preventDefault();
      isLongPress = false;
      btn.classList.add('pressed');
      timer = setTimeout(() => {
        isLongPress = true;
        // -1 (min 0)
        const before = state[type];
        if (before > 0) {
          state[type]--;
          state.weekly = Math.max(0, state.weekly - 1);
          saveData(state);
          render();
          vibrate(30);
        }
      }, LONG_PRESS_MS);
    }

    function endPress(e) {
      e.preventDefault();
      btn.classList.remove('pressed');
      clearTimeout(timer);
      if (!isLongPress) {
        // +1
        state[type]++;
        state.weekly++;
        saveData(state);
        render();
        vibrate(15);
      }
    }

    function cancelPress() {
      btn.classList.remove('pressed');
      clearTimeout(timer);
    }

    btn.addEventListener('mousedown', startPress);
    btn.addEventListener('mouseup', endPress);
    btn.addEventListener('mouseleave', cancelPress);

    btn.addEventListener('touchstart', startPress, { passive: false });
    btn.addEventListener('touchend', endPress, { passive: false });
    btn.addEventListener('touchcancel', cancelPress);
  });

  function vibrate(ms) {
    if (navigator.vibrate) navigator.vibrate(ms);
  }

  // リセット
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('今日のカウントをリセットしますか？')) return;
    const todayTotal = state.beer + state.wine + state.sour;
    state.beer = 0;
    state.wine = 0;
    state.sour = 0;
    state.weekly = Math.max(0, state.weekly - todayTotal);
    state.date = todayStr();
    saveData(state);
    render();
  });

  render();
</script>
</body>
</html>
